[main]
shell=fish
term=xterm-256color
font=D2CodingLigature Nerd Font Mono:size=11

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}

[colors]
background=1e1e1e
foreground=ffffff

# Normal colors
regular0=1e1e1e  # black
regular1=e01b24  # red
regular2=26a269  # green
regular3=a2734c  # yellow
regular4=005fd7  # blue
regular5=a347ba  # magenta
regular6=2aa1b3  # cyan
regular7=d0cfcc  # white

# Bright colors
bright0=5e5c64   # bright black
bright1=f66151   # bright red
bright2=33da7a   # bright green
bright3=e9ad0c   # bright yellow
bright4=2a7bde   # bright blue
bright5=c061cb   # bright magenta
bright6=33c7de   # bright cyan
bright7=ffffff   # bright white

# Selection colors
selection-background=3584e4
selection-foreground=ffffff

# URL colors
urls=3584e4