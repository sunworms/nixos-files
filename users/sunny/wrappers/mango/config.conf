exec-once=set +e
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
exec-once=fnott
exec-once=waybar
exec-once=playerctld
exec-once=swww-daemon
exec-once=emacs --daemon
exec-once=foot --server
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=swayidle -w timeout 300 'hyprlock' timeout 600 'wlopm --off \*' after-resume 'wlopm --on \*' before-sleep 'hyprlock'
exec-once=apply-gtk-settings
exec-once=systemctl --user start warp-taskbar.service
exec-once=sway-audio-idle-inhibit

blur=1
blur_layer=1
shadows=1
focused_opacity=0.85
unfocused_opacity=0.6

animations=1
layer_animations=1

enable_hotarea=0

scroller_proportion_preset=0.5,0.8,1.0

sloppyfocus=0
warpcursor=0

cursor_theme=volantes_cursors

trackpad_natural_scrolling=1

borderpx=0

tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller
tagrule=id:6,layout_name:scroller
tagrule=id:7,layout_name:scroller
tagrule=id:8,layout_name:scroller
tagrule=id:9,layout_name:scroller
tagrule=id:10,layout_name:scroller

layerrule=noblur:1,layer_name:swww-daemon
layerrule=noblur:1,layer_name:selection

windowrule=isfloating:1,isglobal:1,width:400,height:225,offsetx:90,offsety:0,focused_opacity:0.9,unfocused_opacity:0.9,appid:zen-beta,title:Picture-in-Picture

env=CLUTTER_BACKEND,wayland,x11,*
env=GDK_BACKEND,wayland,x11,*
env=NIXOS_OZONE_WL,1
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=QT_QPA_PLATFORM,wayland
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=SDL_VIDEODRIVER,wayland
env=_JAVA_AWT_WM_NONREPARENTING,1
env=EDITOR,emacsclient -c
env=SUDO_EDITOR,emacsclient -c
env=VISUAL,emacsclient -c
env=GTK_THEME,Adwaita-dark
env=QT_QPA_PLATFORMTHEME,gtk3

bind=Super+Shift,r,reload_config

bind=Super,q,killclient
bind=Super,t,spawn,footclient
bind=Super+Shift,t,spawn_shell,pkill foot && foot --server
bind=Super,e,spawn,emacsclient -nc
bind=Super+Shift,e,spawn_shell,pkill emacs && emacs --daemon
bind=Super+Shift,w,spawn,reload-bar
bind=Super,a,spawn,fuzzel --no-icons
bind=Super,Escape,spawn,fuzzel-logout-menu
bind=Super,v,spawn,cliphist-fuzzel-img
bind=Super+Alt,l,spawn,hyprlock
bind=Super,p,spawn_shell,hyprpicker - | wl-copy

bind=None,Print,spawn_shell,grim - | satty --filename -

bindl=None,XF86AudioRaiseVolume,spawn_shell,wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+ && volume-notifs
bindl=None,XF86AudioLowerVolume,spawn_shell,wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- && volume-notifs
bindl=None,XF86AudioMute,spawn_shell,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=None,XF86AudioMicMute,spawn_shell,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl=None,XF86MonBrightnessUp,spawn_shell,brightnessctl set +1% && bright-notifs
bindl=None,XF86MonBrightnessDown,spawn_shell,brightnessctl set 1%- && bright-notifs

bind=Super,Left,focusdir,left
bind=Super,Right,focusdir,right
bind=Super,Up,focusdir,up
bind=Super,Down,focusdir,down

bind=Super+Ctrl,Left,exchange_client,left
bind=Super+Ctrl,Right,exchange_client,right
bind=Super+Ctrl,Up,exchange_client,up
bind=Super+Ctrl,Down,exchange_client,down

bind=Super,Tab,toggleoverview
bind=Super+Shift,v,togglefloating
bind=Super,m,togglemaximizescreen
bind=Super+Shift,f,togglefullscreen
bind=Super+Alt,f,togglefakefullscreen

bind=Super,r,switch_proportion_preset

bind=Super+Alt,Left,viewtoleft
bind=Super+Alt,Right,viewtoright

bind=Super+Ctrl+Alt,Left,viewtoleft_have_client
bind=Super+Ctrl+Alt,Right,viewtoright_have_client

bind=Super+Alt,1,view,1
bind=Super+Alt,2,view,2
bind=Super+Alt,3,view,3
bind=Super+Alt,4,view,4
bind=Super+Alt,5,view,5
bind=Super+Alt,6,view,6
bind=Super+Alt,7,view,7
bind=Super+Alt,8,view,8
bind=Super+Alt,9,view,9
bind=Super+Alt,0,view,10

bind=Super+Shift,1,tag,1
bind=Super+Shift,2,tag,2
bind=Super+Shift,3,tag,3
bind=Super+Shift,4,tag,4
bind=Super+Shift,5,tag,5
bind=Super+Shift,6,tag,6
bind=Super+Shift,7,tag,7
bind=Super+Shift,8,tag,8
bind=Super+Shift,9,tag,9
bind=Super+Shift,0,tag,10

bind=Super+Shift,Left,tagtoleft
bind=Super+Shift,Right,tagtoright

mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

gesturebind=none,right,3,focusdir,left
gesturebind=none,left,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,right,4,viewtoleft_have_client
gesturebind=none,left,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
