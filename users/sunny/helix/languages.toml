[language-server.tinymist]
command = "tinymist"
config.preview.background.enabled = true
config.preview.background.args = [
  "--data-plane-host=127.0.0.1:0", "--invert-colors=auto", "--open"]

[[language]]
name = "nix"
auto-format = true

[[language]]
name = "typst"
auto-format = true
formatter = { command = "typstyle" }
