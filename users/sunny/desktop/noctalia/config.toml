[audio]
enable_overdrive = true

[bar.default]
background_opacity = 0.89999997615814209
capsule = false
end = [ "notifications", "network", "bluetooth", "cpu", "ram", "temp", "volume", "brightness", "battery" ]
position = "bottom"
start = [ "launcher", "wallpaper", "workspaces", "tray", "media", "audio_visualizer" ]
widget_spacing = 15
margin_h = 40
margin_v = 0
radius = 8
radius_bottom_left = 0
radius_bottom_right = 0
scale = 1.0
shadow = false
thickness = 30

[idle.behavior.lock]
timeout = 300
command = "noctalia:screen-lock"
enabled = true

[idle.behavior.screen-off]
timeout = 600
command = "noctalia:dpms-off"
resume_command = "noctalia:dpms-on"

[dock]
auto_hide = true
background_opacity = 0.89999997615814209
enabled = false
position = "top"

[notification]
background_opacity = 0.89999997615814209

[shell]
avatar_path = "/home/sunny/arch-files/haruta.jpg"
clipboard_auto_paste = "off"
password_style = "random"
polkit_agent = true
settings_show_advanced = true
telemetry_enabled = false

[theme]
builtin = "Noctalia"
source = "wallpaper"
wallpaper_scheme = "faithful"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "helix", "kcolorscheme", "niri", "kitty" ]
    community_ids = [ "discord", "pywalfox" ]
    enable_user_templates = false

[wallpaper]
directory = "/home/sunny/Pictures/walls"

[weather]
address = "Jatani, India"

[widget.clock]
format = "{:%a, %b %d, %H:%M}"

[widget.network]
show_label = false

[widget.workspaces]
display = "none"

[widget.cpu]
display = "gauge"
show_label = false
type = "sysmon"

[widget.ram]
display = "gauge"
show_label = false
stat = "ram_used"
type = "sysmon"

[widget.temp]
show_label = false
stat = "cpu_temp"
type = "sysmon"
