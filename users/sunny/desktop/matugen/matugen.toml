[config.wallpaper]
command = "swww"
arguments = ["img", "--transition-type", "center"]
set = true

[templates.waybar]
input_path = "~/.config/matugen/waybar.css"
output_path = "~/.config/waybar/colors.css"
post_hook = "pkill -SIGUSR2 waybar"

[templates.discord]
input_path = "~/.config/matugen/discord.css"
output_path = "~/.config/matugen/discord-matugen.css"

[templates.fuzzel]
input_path = "~/.config/matugen/fuzzel.ini"
output_path = "~/.config/fuzzel/colors.ini"

[templates.mako]
input_path = '~/.config/matugen/mako-colors'
output_path = '~/.config/mako/colors'
post_hook = 'makoctl reload'

[templates.foot]
input_path = '~/.config/matugen/foot.ini'
output_path = '~/.config/foot/colors.ini'

[templates.gtk3]
input_path = '~/.config/matugen/gtk-colors.css'
output_path = '~/.config/gtk-3.0/gtk.css'

[templates.gtk4]
input_path = '~/.config/matugen/gtk-colors.css'
output_path = '~/.config/gtk-4.0/gtk.css'

[templates.helix]
input_path = '~/.config/matugen/helix.toml'
output_path = '~/.config/helix/themes/matugen.toml'

[templates.niri]
input_path = '~/.config/matugen/niri.kdl'
output_path = '~/.config/niri/colors.kdl'

[templates.zathura]
input_path = '~/.config/matugen/zathura-colors'
output_path = '~/.config/zathura/zathurarc'

[templates.btop]
input_path = '~/.config/matugen/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'
post_hook = 'pkill -USR2 btop || true'
