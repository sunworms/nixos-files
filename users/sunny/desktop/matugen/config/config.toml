[config]

[config.wallpaper]
set = true
command = "awww img --transition-type none {{ image }}"

[templates]

[templates.btop]
input_path = "~/.config/matugen/btop.theme"
output_path = '~/.config/btop/themes/matugen.theme'
post_hook = 'pkill -USR2 btop || true'

[templates.fuzzel]
input_path = "~/.config/matugen/fuzzel.ini"
output_path = "~/.config/fuzzel/colors.ini"

[templates.gtk3]
input_path = "~/.config/matugen/gtk-colors.css"
output_path = "~/.config/gtk-3.0/gtk.css"
post_hook = '''
  dconf write /org/gnome/desktop/interface/gtk-theme "''"
  dconf write /org/gnome/desktop/interface/gtk-theme "'adw-gtk3'"
'''

[templates.gtk4]
input_path = "~/.config/matugen/gtk-colors.css"
output_path = "~/.config/gtk-4.0/gtk.css"

[templates.gtklock]
input_path = "~/.config/matugen/gtklock-style.css"
output_path = "~/.config/gtklock/style.css"

[templates.helix]
input_path = "~/.config/matugen/helix.toml"
output_path = "~/.config/helix/themes/matugen.toml"
post_hook = "pkill -USR1 hx"

[templates.kitty]
input_path = "~/.config/matugen/kitty-colors.conf"
output_path = '~/.config/kitty/themes/Matugen.conf'
post_hook = "pkill -SIGUSR1 kitty"

[templates.mako]
input_path = "~/.config/matugen/mako"
output_path = "~/.config/mako/colors"
post_hook = "makoctl reload"

[templates.kde]
input_path = "~/.config/matugen/Matugen.colors"
output_path = "~/.local/share/color-schemes/Matugen.colors"

[templates.qt5ct]
input_path = "~/.config/matugen/qtct-colors.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"

[templates.qt6ct]
input_path = "~/.config/matugen/qtct-colors.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"

[templates.vesktop]
input_path = "~/.config/matugen/midnight-discord.css"
output_path = "~/.config/vesktop/themes/midnight-discord.css"

[templates.niri]
input_path = "~/.config/matugen/niri-colors.kdl"
output_path = "~/.config/niri/colors.kdl"

[templates.waybar]
input_path = "~/.config/matugen/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"
post_hook = "pkill -SIGUSR2 waybar"
