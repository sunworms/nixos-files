font: Aporetic Sans 12
anchor: center 

menu:
  - key: "w"
    desc: Toggle Waybar
    cmd: pkill -SIGUSR1 waybar
  - key: "h"
    desc: Helium
    cmd: helium %U
  - key: "n"
    desc: Neovim
    cmd: foot nvim
  - key: "s"
    desc: Steam
    cmd: steam
  - key: "f"
    desc: Files
    cmd: nautilus
  - key: "z"
    desc: Zathura
    cmd: zathura
  - key: "e"
    desc: Unicode and Emoji
    cmd: rofimoji --selector fuzzel --action copy --files all
  - key: "i"
    desc: Networks
    cmd: foot nmtui
  - key: "b"
    desc: btop
    cmd: foot btop
  
