[inputs.flatpaks]
url = "gh:in-a-dil-emma/declarative-flatpak/latest"

[inputs.emacs-overlay]
url = "gh:nix-community/emacs-overlay"

[inputs.zen-browser]
url = "gh:0xc000022070/zen-browser-flake/beta"

[inputs.hjem]
url = "gh:feel-co/hjem"

[inputs.sops-nix]
url = "gh:Mic92/sops-nix"

[inputs.noctalia]
url = "gh:noctalia-dev/noctalia"
