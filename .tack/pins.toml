# tack pins. edit by hand or with tack add / rm / alias
# nix reads pins.lock.json; this file drives tack update

# shorturl schemes. scheme:rest expands rest into {path}
[shorturls]
gh = "github:{path}" # github
nixpkgs = "https://channels.nixos.org/{path}/nixexprs.tar.xz"

# all_follow: input name -> top-level pin it follows wherever it appears
# opt out per-input with exclude_follow
[all_follow]
# no deduplication
nixpkgs = ["nixpkgs", "nixpkgs-lib"]

# [inputs.<name>] fields
#   url             required, shorturl ok; ?rev=<sha> pins an exact commit
#   flake           default true; false exposes the source path
#   follows         { child = "pin" } override map
#   exclude_follow  all_follow names to skip
#   dir             subdir holding flake.nix
#   submodules      fetch git submodules

[inputs.nixpkgs]
url = "nixpkgs:nixos-unstable"

[inputs.preservation]
url = "gh:nix-community/preservation"

[inputs.flatpaks]
url = "gh:in-a-dil-emma/declarative-flatpak/latest"

[inputs.emacs-overlay]
url = "gh:nix-community/emacs-overlay"

[inputs.zen-browser]
url = "gh:0xc000022070/zen-browser-flake/beta"

[inputs.hjem]
url = "gh:feel-co/hjem"

[inputs.sops-nix]
url = "gh:Mic92/sops-nix"

[inputs.noctalia]
url = "gh:noctalia-dev/noctalia-shell"

[inputs.tack]
url = "gh:manic-systems/tack"

[inputs.nh]
url = "gh:nix-community/nh/pull/723/head"
