[shorturls]
gh = "github:{path}"
nixpkgs = "https://channels.nixos.org/{path}/nixexprs.tar.xz"

[all_follow]
type = ["fetch"]

[inputs.nixpkgs]
url = "nixpkgs:nixos-unstable"

[inputs.preservation]
