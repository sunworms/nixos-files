[shorturls]
gh = "github:{path}"
nixpkgs = "https://channels.nixos.org/{path}/nixexprs.tar.xz"

[all_follow]
nixpkgs = ["nixpkgs", "nixpkgs-lib"]

[inputs.nixpkgs]
url = "nixpkgs:nixos-unstable"

[inputs.preservation]
url = "gh:nix-community/preservation"

[inputs.flatpaks]
url = "gh:in-a-dil-emma/declarative-flatpak/latest"

[inputs.hjem]
url = "gh:feel-co/hjem"

[inputs.zen-browser]
url = "gh:0xc000022070/zen-browser-flake/beta"

[inputs.neovim-config]
url = "git+https://git.gay/sunworms/neovim-config"

[inputs.sops-nix]
url = "gh:Mic92/sops-nix"

[inputs.noctalia]
url = "gh:noctalia-dev/noctalia/cachix"
exclude_follow = ["nixpkgs"]

[inputs.watt]
url = "gh:NotAShelf/watt"
