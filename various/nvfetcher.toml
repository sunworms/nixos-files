# inputs
[nixpkgs]
src.git = "https://github.com/NixOS/nixpkgs"
src.branch = "nixos-unstable"
fetch.github = "NixOS/nixpkgs"

[preservation]
src.git = "https://github.com/nix-community/preservation"
fetch.github = "nix-community/preservation"

[sops-nix]
src.git = "https://github.com/Mic92/sops-nix"
fetch.github = "Mic92/sops-nix"

[hjem]
src.git = "https://github.com/feel-co/hjem"
fetch.github = "feel-co/hjem"

[quickshell]
src.git = "https://github.com/quickshell-mirror/quickshell"
fetch.github = "quickshell-mirror/quickshell"
pinned = true

[emacs]
src.git = "https://git.gay/sunworms/emacs-config"
fetch.git = "https://git.gay/sunworms/emacs-config"

[atomic-chrome]
src.git = "https://github.com/KarimAziev/atomic-chrome"
fetch.github = "KarimAziev/atomic-chrome"

# binary packages
[eden-nightly]
src.github_tag = "eden-emulator/Releases"
fetch.url = "https://github.com/eden-emulator/Releases/releases/download/$ver/Eden-Linux-$ver-amd64-clang-pgo.AppImage"

[helium]
src.github = "imputnet/helium-linux"
fetch.url = "https://github.com/imputnet/helium-linux/releases/download/$ver/helium-$ver-x86_64.AppImage"

